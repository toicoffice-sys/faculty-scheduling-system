<script>
// ─── DLSL Faculty Timetabler — Client JS ──────────────────────────────────

const LOGO_SRC = 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAABKQAAASkCAMAAABq/SLiAAAACXBIWXMAACMQAAAjEAFnL93WAAADAFBMVE...'; // placeholder; actual logo embedded at deploy

const DAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday'];
const DEPT_NAMES = {
  SDA:   'School of Design & Arts',
  SMIT:  'School of Management & Information Technology',
  SHRIM: 'School of Hotel, Restaurant & Institutions Mgmt',
  STHM:  'School of Tourism & Hospitality Management',
  GEd:   'General Education Division',
};
const ROOM_TYPES = [
  {v:'classroom',l:'Classroom',i:'🏫'},{v:'lab',l:'Lab/Computer Lab',i:'💻'},
  {v:'gym',l:'Gymnasium',i:'🏋️'},{v:'hall',l:'Lecture Hall',i:'🎓'},
  {v:'music',l:'Studio/Music',i:'🎬'},{v:'art',l:'Design Studio',i:'🎨'},
  {v:'library',l:'Library',i:'📚'},{v:'workshop',l:'Workshop',i:'🪡'},
];
const CONSTRAINT_TYPES = [
  {v:'spread_across_days',   l:'Spread across days (no 2 same day)'},
  {v:'must_be_on_day',       l:'Must be on specific day'},
  {v:'must_not_be_on_day',   l:'Must NOT be on specific day'},
  {v:'room_required',        l:'Room type required'},
  {v:'no_first_period',      l:'Not in first period of day'},
  {v:'no_last_period',       l:'Not in last period of day'},
  {v:'teacher_max_daily',    l:'Teacher max sessions per day'},
];

// ─── State ─────────────────────────────────────────────────────────────────

const S = {
  user: null,
  faculty: [], buildings: [], rooms: [], subjects: [],
  sections: [], periods: [], lessons: [], schedule: [], constraints: [],
  config: {},
  tab: 'schedule',
  // Schedule
  selectedLessonId: null,
  filterFacId: '', filterSecId: '', filterSubjId: '',
  // Faculty
  selectedFacId: null,
  facSearch: '', facDeptFilter: '',
  // Rooms
  selectedRoomId: null,
  // Sections / Subjects
  // Admin
  adminUsers: [],
  loading: false,
};

// ─── Helpers ───────────────────────────────────────────────────────────────

function byId(arr, id) { return arr.find(x => x.id === id) || null; }
function q(sel, root) { return (root || document).querySelector(sel); }
function qa(sel, root) { return Array.from((root || document).querySelectorAll(sel)); }
function esc(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function facName(f) { return f ? f.lastName + ', ' + f.firstName : '—'; }
function subjColor(subjId) { const s = byId(S.subjects, subjId); return s ? s.color : '#2E7D32'; }

function teachingPeriodNames() {
  const names = new Set();
  S.periods.filter(p => !p.isBreak && !p.isLunch).forEach(p => names.add(p.name));
  return Array.from(names).sort();
}
function periodByDayName(day, name) {
  return S.periods.find(p => p.day === day && p.name === name) || null;
}
function periodStartTime(name) {
  const p = S.periods.find(pp => pp.name === name);
  return p ? p.startTime : '';
}
function entriesForPeriod(periodId) {
  return S.schedule.filter(e => e.periodId === periodId);
}
function placedLessonIds() {
  return new Set(S.schedule.map(e => e.lessonId));
}
function unplacedLessons() {
  const placed = placedLessonIds();
  let list = S.lessons.filter(l => !placed.has(l.id));
  if (S.filterSubjId) list = list.filter(l => l.subjectId === S.filterSubjId);
  if (S.filterFacId)  list = list.filter(l => l.teacherId === S.filterFacId);
  if (S.filterSecId)  list = list.filter(l => l.sectionId === S.filterSecId);
  return list;
}
function conflictCount() {
  return S.schedule.filter(e => e._conflict).length;
}
function getCompletionPct() {
  if (!S.lessons.length) return 0;
  return Math.round((S.schedule.length / S.lessons.length) * 100);
}
function filteredFaculty() {
  let list = [...S.faculty];
  if (S.facDeptFilter) list = list.filter(f => f.department === S.facDeptFilter);
  if (S.facSearch.trim()) {
    const q2 = S.facSearch.trim().toLowerCase();
    list = list.filter(f => (f.firstName + ' ' + f.lastName + ' ' + f.email).toLowerCase().includes(q2));
  }
  return list;
}
function canEdit()  { return S.user && (S.user.role === 'editor' || S.user.role === 'admin'); }
function canAdmin() { return S.user && S.user.role === 'admin'; }

// ─── Toast ─────────────────────────────────────────────────────────────────

function toast(msg, type) {
  const wrap = q('.toast-wrap') || (() => {
    const el = document.createElement('div');
    el.className = 'toast-wrap';
    document.body.appendChild(el);
    return el;
  })();
  const t = document.createElement('div');
  t.className = 'toast' + (type === 'err' ? ' toast--err' : type === 'warn' ? ' toast--warn' : '');
  t.textContent = msg;
  wrap.appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

// ─── GAS API calls ─────────────────────────────────────────────────────────

function call(fn, args, onSuccess, onError) {
  let runner = google.script.run.withSuccessHandler(r => {
    S.loading = false;
    onSuccess && onSuccess(r);
  }).withFailureHandler(e => {
    S.loading = false;
    const msg = e.message || 'Error occurred';
    toast(msg, 'err');
    onError && onError(e);
    console.error(fn, e);
  });
  S.loading = true;
  runner[fn].apply(runner, args || []);
}

// ─── Boot ──────────────────────────────────────────────────────────────────

window.addEventListener('DOMContentLoaded', function () {
  google.script.run
    .withSuccessHandler(function(data) {
      if (data.error === 'not_authorized') {
        renderUnauthorized(false);
      } else if (data.error === 'domain_restricted') {
        renderUnauthorized(true, data.email);
      } else {
        Object.assign(S, data);
        S.tab = 'schedule';
        render();
      }
    })
    .withFailureHandler(function(e) {
      q('#app').innerHTML = '<div class="auth-page"><div class="auth-card"><p class="auth-err auth-msg">Failed to load: ' + esc(e.message) + '</p></div></div>';
    })
    .getBootData();
});

function renderUnauthorized(domainRestricted, email) {
  const logoEl = '<img class="auth-logo" src="' + LOGO_SRC + '" alt="DLSL Logo" onerror="this.style.display=\'none\'">';
  const msg = domainRestricted
    ? '<p class="auth-msg auth-err">Access denied. Only <strong>@dlsl.edu.ph</strong> accounts are allowed.<br><small>Signed in as: ' + esc(email) + '</small></p>'
    : '<p class="auth-msg">Your account has not been added to the system. Please contact your system administrator.</p>';
  q('#app').innerHTML = '<div class="auth-page"><div class="auth-card">'
    + logoEl
    + '<h2 class="auth-title">DLSL Faculty Timetabler</h2>'
    + '<p class="auth-sub">De La Salle Lipa · Scheduling System</p>'
    + msg + '</div></div>';
}

// ─── Main Render ───────────────────────────────────────────────────────────

function render() {
  const app = q('#app');
  app.innerHTML = renderLayout();
  bindEvents();
}

function renderLayout() {
  const TABS = [
    { id: 'schedule',    label: 'Schedule',     badge: conflictCount() || 0 },
    { id: 'faculty',     label: 'Faculty' },
    { id: 'rooms',       label: 'Rooms' },
    { id: 'subjects',    label: 'Subjects' },
    { id: 'sections',    label: 'Sections' },
    { id: 'constraints', label: 'Rules' },
    { id: 'reports',     label: 'Reports' },
    ...(canAdmin() ? [{ id: 'admin', label: 'Admin' }] : []),
    { id: 'guide', label: '❓ Guide' },
  ];
  const cfg = S.config;
  const pct = getCompletionPct();
  const conflicts = conflictCount();

  return '<div class="app">'
    + '<header class="header">'
    + '<div class="header__brand">'
    + '<img class="header__logo" src="' + LOGO_SRC + '" alt="DLSL" onerror="this.style.display=\'none\'">'
    + '<div class="header__title-wrap">'
    + '<div class="header__title">Faculty Timetabler</div>'
    + '<div class="header__sub">De La Salle Lipa</div>'
    + '</div></div>'
    + '<nav class="header__nav">' + TABS.map(t =>
        '<button class="nav-btn' + (S.tab === t.id ? ' active' : '') + '" data-tab="' + t.id + '">'
        + esc(t.label)
        + (t.badge ? '<span class="nav-badge">' + t.badge + '</span>' : '')
        + '</button>'
      ).join('') + '</nav>'
    + '<div class="header__right">'
    + '<div class="term-chip">' + esc(cfg.term || '') + ' ' + esc(cfg.academicYear || '') + '</div>'
    + '<div class="stat-pills">'
    + statPill(pct + '%', 'Done')
    + statPill(S.schedule.length, 'Placed')
    + statPill(unplacedLessons().length, 'Pending')
    + (conflicts ? statPill(conflicts, '⚠ Conflicts') : '')
    + '</div>'
    + '<div class="user-chip"><span class="role-badge role-badge--' + S.user.role + '">' + esc(S.user.role) + '</span>' + esc(S.user.name) + '</div>'
    + '</div></header>'
    + renderTabContent()
    + '<div class="toast-wrap"></div>'
    + '</div>';
}

function statPill(val, lbl) {
  return '<div class="stat-pill"><span class="stat-pill__val">' + val + '</span><span class="stat-pill__lbl">' + esc(lbl) + '</span></div>';
}

function renderTabContent() {
  switch (S.tab) {
    case 'schedule':    return renderScheduleTab();
    case 'faculty':     return renderFacultyTab();
    case 'rooms':       return renderRoomsTab();
    case 'subjects':    return renderSubjectsTab();
    case 'sections':    return renderSectionsTab();
    case 'constraints': return renderConstraintsTab();
    case 'reports':     return renderReportsTab();
    case 'admin':       return renderAdminTab();
    case 'guide':       return renderGuideTab();
    default:            return '';
  }
}

// ─── Schedule Tab ──────────────────────────────────────────────────────────

function renderScheduleTab() {
  return '<div class="main"><div class="tab-content--nogap" style="flex-direction:column">'
    + renderFilterBar()
    + '<div class="schedule-layout">'
    + renderUnscheduledPanel()
    + renderGridArea()
    + '</div></div></div>';
}

function renderFilterBar() {
  return '<div class="filter-bar">'
    + '<span class="filter-bar__label">Filter by:</span>'
    + '<select class="form-select form-select--sm" id="filt-fac" style="min-width:140px">'
    + '<option value="">All Faculty</option>'
    + S.faculty.slice().sort((a,b)=>(a.lastName+a.firstName).localeCompare(b.lastName+b.firstName))
               .map(f => '<option value="' + esc(f.id) + '"' + (S.filterFacId===f.id?' selected':'') + '>' + esc(facName(f)) + '</option>').join('')
    + '</select>'
    + '<select class="form-select form-select--sm" id="filt-sec" style="min-width:140px">'
    + '<option value="">All Sections</option>'
    + S.sections.map(s => '<option value="' + esc(s.id) + '"' + (S.filterSecId===s.id?' selected':'') + '>' + esc(s.name) + '</option>').join('')
    + '</select>'
    + '<select class="form-select form-select--sm" id="filt-subj" style="min-width:140px">'
    + '<option value="">All Subjects</option>'
    + S.subjects.map(s => '<option value="' + esc(s.id) + '"' + (S.filterSubjId===s.id?' selected':'') + '>' + esc(s.code) + '</option>').join('')
    + '</select>'
    + (S.filterFacId||S.filterSecId||S.filterSubjId ? '<button class="btn btn-ghost btn-sm" id="clear-filter">Clear</button>' : '')
    + '<div style="margin-left:auto;display:flex;gap:8px">'
    + (canEdit() ? '<button class="btn btn-primary btn-sm" id="btn-auto-sched">⚡ Auto Schedule</button>' : '')
    + (canAdmin() ? '<button class="btn btn-danger btn-sm" id="btn-clear-sched">Clear All</button>' : '')
    + '</div></div>';
}

function renderUnscheduledPanel() {
  const unplaced = unplacedLessons();
  return '<div class="unscheduled-panel">'
    + '<div class="unscheduled-panel__head">'
    + '<div class="unscheduled-panel__title">To Schedule <span class="text-muted">(' + unplaced.length + ')</span></div>'
    + (S.selectedLessonId
        ? '<div style="font-size:11px;color:var(--g800);font-weight:600;padding:4px 0">→ Click a grid cell to place</div>'
        : '<div style="font-size:11px;color:var(--text-muted)">Click a lesson to select it</div>')
    + '</div>'
    + '<div class="unscheduled-panel__list">'
    + (unplaced.length === 0
        ? '<div class="unscheduled-panel__empty">All lessons scheduled! ✓</div>'
        : unplaced.map(l => renderLessonItem(l)).join(''))
    + '</div></div>';
}

function renderLessonItem(l) {
  const subj  = byId(S.subjects, l.subjectId);
  const fac   = byId(S.faculty,  l.teacherId);
  const sec   = byId(S.sections, l.sectionId);
  const color = subj ? subj.color : '#2E7D32';
  const sel   = S.selectedLessonId === l.id;
  return '<div class="lesson-item' + (sel ? ' selected' : '') + '" data-lesson-id="' + esc(l.id) + '">'
    + '<div class="lesson-item__subj"><span class="lesson-item__dot" style="background:' + color + '"></span>'
    + esc(subj ? subj.code : '?') + '</div>'
    + '<div class="lesson-item__teacher">' + esc(fac ? facName(fac) : 'No faculty') + '</div>'
    + '<div class="lesson-item__meta">'
    + '<span class="lesson-item__chip lesson-item__chip--section">' + esc(sec ? sec.name : '—') + '</span>'
    + '<span class="lesson-item__chip lesson-item__chip--periods">' + l.periodsRequired + '×/wk</span>'
    + '</div></div>';
}

function renderGridArea() {
  const pNames = teachingPeriodNames();
  const hasLunch = S.periods.some(p => p.isLunch);

  let grid = '<div class="schedule-grid-area"><div class="schedule-grid">';
  grid += '<div class="grid-corner"></div>';
  DAYS.forEach(d => { grid += '<div class="grid-day-hdr">' + d.slice(0,3) + '</div>'; });

  // Lunch row first marker
  let lunchInserted = false;

  pNames.forEach(pName => {
    // Insert lunch row if periods come after lunch and we haven't inserted yet
    if (hasLunch && !lunchInserted) {
      const firstLunchPeriod = S.periods.find(p => p.isLunch);
      const firstTeachingAfterLunch = S.periods.find(p => !p.isLunch && !p.isBreak && p.name === pName && p.startTime > (firstLunchPeriod ? firstLunchPeriod.startTime : ''));
      if (firstTeachingAfterLunch && firstLunchPeriod && firstLunchPeriod.startTime < firstTeachingAfterLunch.startTime) {
        grid += renderLunchRow(firstLunchPeriod);
        lunchInserted = true;
      }
    }

    const startTime = periodStartTime(pName);
    grid += '<div class="grid-period-lbl"><span>' + esc(pName) + '</span><span class="time">' + esc(startTime) + '</span></div>';
    DAYS.forEach(day => { grid += renderGridCell(day, pName); });
  });

  // Lunch if never inserted
  if (hasLunch && !lunchInserted) {
    const lp = S.periods.find(p => p.isLunch);
    if (lp) grid += renderLunchRow(lp);
  }

  grid += '</div></div>';
  return grid;
}

function renderLunchRow(lunchPeriod) {
  let html = '<div class="grid-period-lbl"><span>Lunch</span><span class="time">' + esc(lunchPeriod.startTime) + '</span></div>';
  DAYS.forEach(() => { html += '<div class="grid-cell grid-cell--lunch"><div class="grid-cell--lunch-lbl">Lunch Break</div></div>'; });
  return html;
}

function renderGridCell(day, pName) {
  const period = periodByDayName(day, pName);
  if (!period) return '<div class="grid-cell" style="background:var(--g50)"></div>';

  const entries = entriesForPeriod(period.id);
  const filtered = applyEntryFilter(entries);
  const canDrop  = canEdit() && S.selectedLessonId && filtered.length === 0;

  let html = '<div class="grid-cell' + (canDrop ? ' droppable' : '') + '"'
    + ' data-place-period="' + esc(period.id) + '">';
  filtered.forEach(e => { html += renderEntryCard(e); });
  html += '</div>';
  return html;
}

function applyEntryFilter(entries) {
  return entries.filter(e => {
    const l = byId(S.lessons, e.lessonId);
    if (!l) return false;
    if (S.filterFacId  && l.teacherId !== S.filterFacId)  return false;
    if (S.filterSecId  && l.sectionId !== S.filterSecId)  return false;
    if (S.filterSubjId && l.subjectId !== S.filterSubjId) return false;
    return true;
  });
}

function renderEntryCard(entry) {
  const lesson = byId(S.lessons, entry.lessonId);
  if (!lesson) return '';
  const subj  = byId(S.subjects, lesson.subjectId);
  const fac   = byId(S.faculty,  lesson.teacherId);
  const sec   = byId(S.sections, lesson.sectionId);
  const room  = byId(S.rooms,    entry.roomId);
  const color = subj ? subj.color : '#2E7D32';
  const locked = entry.status === 'locked';
  const conflict = entry._conflict;

  return '<div class="entry-card' + (locked ? ' locked' : '') + (conflict ? ' conflict' : '') + '"'
    + ' style="border-left-color:' + color + '"'
    + ' data-entry-id="' + esc(entry.id) + '">'
    + (locked ? '<span class="entry-card__lock-icon">🔒</span>' : '')
    + '<div class="entry-card__subj">' + esc(subj ? subj.code : '?') + '</div>'
    + '<div class="entry-card__teacher">' + esc(fac ? fac.lastName : '—') + '</div>'
    + '<div class="entry-card__meta">'
    + (sec  ? '<span class="entry-card__section">' + esc(sec.name) + '</span>' : '')
    + (room ? '<span class="entry-card__room">' + esc(room.code || room.name) + '</span>' : '')
    + '</div>'
    + (conflict ? '<div class="entry-card__conflict">⚠ Conflict</div>' : '')
    + '<div class="entry-card__actions">'
    + (canEdit() ? '<button class="entry-card__btn entry-card__btn--lock" data-entry-lock="' + esc(entry.id) + '">' + (locked ? '🔓' : '🔒') + '</button>' : '')
    + (canEdit() && !locked ? '<button class="entry-card__btn entry-card__btn--remove" data-entry-remove="' + esc(entry.id) + '">✕</button>' : '')
    + '</div></div>';
}

// ─── Faculty Tab ───────────────────────────────────────────────────────────

function renderFacultyTab() {
  const filtered = filteredFaculty();
  const depts = [...new Set(S.faculty.map(f => f.department))].sort();
  const selFac = S.selectedFacId ? byId(S.faculty, S.selectedFacId) : null;

  return '<div class="main"><div class="tab-content--nogap two-col">'
    + '<div class="sidebar">'
    + '<div class="sidebar__head">'
    + '<div class="sidebar__head-row">'
    + '<div class="sidebar__title">Faculty <span class="text-muted text-sm">(' + filtered.length + '/' + S.faculty.length + ')</span></div>'
    + (canEdit() ? '<button class="btn btn-primary btn-sm" id="btn-add-fac">+ Add</button>' : '')
    + '</div>'
    + '<input class="form-input form-input--sm w-full mb-1" id="fac-search" placeholder="Search name or email…" value="' + esc(S.facSearch) + '">'
    + '<select class="form-select form-select--sm w-full" id="fac-dept-filter">'
    + '<option value="">All Departments</option>'
    + depts.map(d => '<option value="' + esc(d) + '"' + (S.facDeptFilter===d?' selected':'') + '>' + esc(d) + ' — ' + esc(DEPT_NAMES[d]||d) + '</option>').join('')
    + '</select>'
    + '</div>'
    + '<div class="sidebar__list">'
    + filtered.map(f => renderFacListItem(f)).join('')
    + '</div></div>'
    + '<div class="detail-pane">'
    + (selFac ? renderFacDetail(selFac) : renderFacFormOrPlaceholder())
    + '</div></div></div>';
}

function renderFacListItem(f) {
  const active = S.selectedFacId === f.id;
  const wk = S.schedule.filter(e => { const l = byId(S.lessons,e.lessonId); return l && l.teacherId === f.id; }).length;
  return '<div class="list-item' + (active ? ' active' : '') + '" data-fac-id="' + esc(f.id) + '">'
    + '<div class="list-item__name">' + esc(f.lastName) + ', ' + esc(f.firstName) + '</div>'
    + '<div class="list-item__sub">' + esc(f.department) + (f.track ? ' · ' + f.track : '') + '</div>'
    + '<div class="list-item__tags">'
    + '<span class="type-badge type-badge--' + f.role + '">' + esc(f.role) + '</span>'
    + '<span class="text-xs text-muted">' + wk + ' sessions</span>'
    + '</div></div>';
}

function renderFacFormOrPlaceholder() {
  if (S._showAddFacForm) return renderFacAddForm();
  return '<div class="detail-pane__placeholder">Select a faculty member to view availability</div>';
}

function renderFacDetail(f) {
  const teachingPeriods = S.periods.filter(p => !p.isBreak && !p.isLunch);
  const pNames = [...new Set(teachingPeriods.map(p => p.name))].sort();
  const wk = S.schedule.filter(e => { const l = byId(S.lessons,e.lessonId); return l && l.teacherId === f.id; }).length;

  function isAvail(day, pid) {
    const a = (f.availability || []).find(x => x.day === day);
    return a && a.periodIds && a.periodIds.includes(pid);
  }

  let html = '<div style="max-width:680px">'
    + '<div style="display:flex;align-items:center;gap:12px;margin-bottom:20px">'
    + '<div><div style="font-size:20px;font-weight:800;color:var(--g900)">' + esc(f.firstName) + ' ' + esc(f.lastName) + '</div>'
    + '<div style="font-size:13px;color:var(--text-muted)">' + esc(f.email) + '</div></div>'
    + '<div style="margin-left:auto;display:flex;gap:8px;align-items:center">'
    + '<span class="type-badge type-badge--' + f.role + '">' + esc(f.role) + '</span>'
    + (canEdit() ? '<button class="btn btn-danger btn-sm" data-del-fac="' + esc(f.id) + '">Delete</button>' : '')
    + '</div></div>'
    + '<div style="display:flex;gap:24px;margin-bottom:20px;font-size:13px">'
    + '<span><span class="text-muted">Dept:</span> <strong>' + esc(f.department) + '</strong></span>'
    + (f.track ? '<span><span class="text-muted">Track:</span> <strong>' + esc(f.track) + '</strong></span>' : '')
    + '<span><span class="text-muted">Max:</span> <strong>' + f.maxPerDay + '/day · ' + f.maxPerWeek + '/week</strong></span>'
    + '<span><span class="text-muted">Scheduled:</span> <strong>' + wk + ' sessions</strong></span>'
    + '</div>';

  // Edit form (inline for availability editing)
  html += '<div style="margin-bottom:16px;padding:14px;background:var(--g50);border-radius:var(--radius);border:1px solid var(--border)">'
    + '<div style="font-size:12px;font-weight:700;color:var(--text-muted);margin-bottom:10px;text-transform:uppercase">Edit Info</div>'
    + '<div class="form-row mb-1">'
    + '<div class="form-group"><label class="form-label">First Name</label><input class="form-input form-input--sm" id="fac-edit-fn" value="' + esc(f.firstName) + '"></div>'
    + '<div class="form-group"><label class="form-label">Last Name</label><input class="form-input form-input--sm" id="fac-edit-ln" value="' + esc(f.lastName) + '"></div>'
    + '<div class="form-group"><label class="form-label">Email</label><input class="form-input form-input--sm" id="fac-edit-email" value="' + esc(f.email) + '"></div>'
    + '</div>'
    + '<div class="form-row">'
    + '<div class="form-group"><label class="form-label">Department</label>'

function renderBuildingTree() {
  let html = '';
  const unassigned = S.rooms.filter(r => !r.buildingId || !byId(S.buildings, r.buildingId));

  S.buildings.forEach(b => {
    const bRooms = S.rooms.filter(r => r.buildingId === b.id);
    html += '<div class="building-group">'
      + '<div class="building-name"><span class="dot"></span>🏢 ' + esc(b.name) + ' <span class="text-muted text-xs">(' + bRooms.length + ')</span>'
      + (canAdmin() ? '<button class="btn-icon btn-xs" data-del-building="' + esc(b.id) + '" title="Delete building" style="margin-left:auto">✕</button>' : '')
      + '</div>'
      + bRooms.map(r => renderRoomListItem(r)).join('')
      + '</div>';
  });

  if (unassigned.length) {
    html += '<div class="building-group">'
      + '<div class="building-name"><span class="dot"></span>Unassigned</div>'
      + unassigned.map(r => renderRoomListItem(r)).join('')

    html += '<div style="padding:20px;text-align:center;color:var(--text-muted);font-size:13px">No rooms yet. Add a building and rooms.</div>';

}

function renderReportsTab() {
  const total    = S.lessons.length;
  const placed   = S.schedule.length;
  const unplaced = total - placed;
  const pct      = total > 0 ? Math.round((placed/total)*100) : 0;

  // Faculty workload
  const facLoads = S.faculty.map(f => {
    const assigned = S.schedule.filter(e => { const l=byId(S.lessons,e.lessonId); return l&&l.teacherId===f.id; }).length;
    return { f, assigned };
  }).sort((a,b) => b.assigned - a.assigned);

  // Subject coverage
  const subjCoverage = S.subjects.map(s => {
    const required = S.lessons.filter(l => l.subjectId === s.id).reduce((n,l) => n + (l.periodsRequired||1), 0);
    const placedN  = S.schedule.filter(e => { const l=byId(S.lessons,e.lessonId); return l&&l.subjectId===s.id; }).length;
    return { s, required, placed: placedN };
  }).filter(x => x.required > 0);

  // Dept breakdown
  const deptStats = {};
  S.faculty.forEach(f => {
    if (!deptStats[f.department]) deptStats[f.department] = { total:0, fullTime:0, partTime:0, shared:0 };
    const d = deptStats[f.department];
    d.total++;
    if (f.role==='full-time') d.fullTime++;
    else if (f.role==='part-time') d.partTime++;
    else if (f.role==='shared') d.shared++;
  });

  return '<div class="main"><div class="tab-content">'
    + '<div class="page-header"><h2 class="page-title">Reports</h2>'
    + '<button class="btn btn-secondary" id="btn-export-csv">⬇ Export CSV</button>'
    + '</div>'
    + '<div class="report-cards">'
    + reportCard(pct + '%', 'Completion', pct < 100 ? '' : 'success')
    + reportCard(placed, 'Sessions Placed', 'success')
    + reportCard(unplaced, 'Unscheduled', unplaced > 0 ? 'danger' : 'success')
    + reportCard(S.faculty.length, 'Faculty')
    + reportCard(S.sections.length, 'Sections')
    + '</div>'

    + '<div class="section-title mt-2">Faculty by Department</div>'
    + '<div class="table-wrap mb-2"><table class="data-table"><thead><tr><th>Dept</th><th>Name</th><th>Total</th><th>Full-time</th><th>Part-time</th><th>Shared</th></tr></thead><tbody>'
    + Object.entries(deptStats).map(([dept, d]) =>
        '<tr><td><span class="dept-badge">' + esc(dept) + '</span></td>'
        + '<td class="text-muted text-sm">' + esc(DEPT_NAMES[dept]||dept) + '</td>'

        + '<td style="color:var(--g800)">' + d.fullTime + '</td>'

    + '<div class="table-wrap mb-2"><table class="data-table"><thead><tr><th>Faculty</th><th>Dept</th><th>Type</th><th>Assigned</th><th>Max/Wk</th><th>Load</th></tr></thead><tbody>'
    + facLoads.map(({ f, assigned }) => {
        const max  = f.maxPerWeek || 22;
        const pct2 = max > 0 ? Math.min(Math.round((assigned/max)*100), 100) : 0;
        const over = assigned > max;
        return '<tr>'
          + '<td><strong>' + esc(facName(f)) + '</strong></td>'
          + '<td><span class="dept-badge">' + esc(f.department) + '</span></td>'
          + '<td><span class="type-badge type-badge--' + f.role + '">' + esc(f.role) + '</span></td>'
          + '<td>' + assigned + '</td>'
          + '<td>' + max + '</td>'
          + '<td><div class="mini-bar">'
          + '<div class="mini-bar__track"><div class="mini-bar__fill" style="width:' + pct2 + '%;background:' + (over?'var(--danger)':'var(--g800)') + '"></div></div>'
          + '<span class="mini-bar__label">' + pct2 + '%</span></div></td></tr>';
      }).join('')
    + '</tbody></table></div>'
    // Subject coverage
    + '<div class="section-title mt-2">Subject Coverage</div>'
    + '<div class="table-wrap"><table class="data-table"><thead><tr><th>Subject</th><th>Dept</th><th>Required</th><th>Placed</th><th>Progress</th></tr></thead><tbody>'
    + subjCoverage.map(({ s, required, placed: p }) => {
        const pct2 = required > 0 ? Math.min(Math.round((p/required)*100), 100) : 0;
        return '<tr>'
          + '<td><span class="subject-dot" style="background:' + s.color + '"></span><strong>' + esc(s.code) + '</strong> — ' + esc(s.name) + '</td>'
          + '<td><span class="dept-badge">' + esc(s.department) + '</span></td>'
          + '<td>' + required + '</td>'
          + '<td>' + p + '</td>'
          + '<td><div class="mini-bar">'
          + '<div class="mini-bar__track"><div class="mini-bar__fill" style="width:' + pct2 + '%;background:' + s.color + '"></div></div>'
          + '<span class="mini-bar__label">' + pct2 + '%</span></div></td></tr>';
      }).join('')
    + '</tbody></table></div></div></div>';
}

}

// ─── Event Binding ─────────────────────────────────────────────────────────

function bindEvents() {
  const app = q('#app');

  // Tab navigation
  app.addEventListener('click', function(e) {
    const tabBtn = e.target.closest('[data-tab]');
    if (tabBtn) { S.tab = tabBtn.dataset.tab; if (S.tab==='admin') loadAdminUsers(); render(); return; }

    // Lesson selection
    const lessonItem = e.target.closest('[data-lesson-id]');
    if (lessonItem) {
      const id = lessonItem.dataset.lessonId;
      S.selectedLessonId = S.selectedLessonId === id ? null : id;
      renderSchedulePartial(); return;
    }

    // Place lesson
    const cell = e.target.closest('[data-place-period]');
    if (cell && S.selectedLessonId && canEdit()) {
      handlePlaceLesson(cell.dataset.placePeriod); return;
    }

    // Entry card actions
    const lockBtn = e.target.closest('[data-entry-lock]');
    if (lockBtn) { handleLockEntry(lockBtn.dataset.entryLock); return; }
    const removeBtn = e.target.closest('[data-entry-remove]');
    if (removeBtn && canEdit()) { handleRemoveEntry(removeBtn.dataset.entryRemove); return; }

    // Faculty list
    const facItem = e.target.closest('[data-fac-id]');
    if (facItem) { S.selectedFacId = facItem.dataset.facId; S._showAddFacForm = false; render(); return; }

    // Faculty actions
    if (e.target.id === 'btn-add-fac') { S._showAddFacForm = true; S.selectedFacId = null; render(); return; }
    if (e.target.id === 'btn-cancel-add-fac') { S._showAddFacForm = false; render(); return; }
    if (e.target.id === 'btn-submit-add-fac') { handleAddFaculty(); return; }
    if (e.target.id === 'btn-save-fac') { handleSaveFaculty(e.target.dataset.facId); return; }
    const delFac = e.target.closest('[data-del-fac]');
    if (delFac && canEdit()) { handleDeleteFaculty(delFac.dataset.delFac); return; }

    // Availability toggle
    const availCell = e.target.closest('[data-avail-period]');
    if (availCell && canEdit()) { handleToggleAvailability(availCell); return; }

    // Room list
    const roomCard = e.target.closest('[data-room-id]');
    if (roomCard) { S.selectedRoomId = roomCard.dataset.roomId; S._showAddRoomForm = false; render(); return; }
    if (e.target.id === 'btn-add-room') { S._showAddRoomForm = true; S.selectedRoomId = null; render(); return; }
    if (e.target.id === 'btn-cancel-room') { S._showAddRoomForm = false; S.selectedRoomId = null; render(); return; }
    if (e.target.id === 'btn-save-room') { handleSaveRoom(e.target.dataset.roomId); return; }
    const delRoom = e.target.closest('[data-del-room]');
    if (delRoom && canEdit()) { handleDeleteRoom(delRoom.dataset.delRoom); return; }
    if (e.target.id === 'btn-add-building') { handleAddBuilding(); return; }
    const delBldg = e.target.closest('[data-del-building]');
    if (delBldg && canAdmin()) { handleDeleteBuilding(delBldg.dataset.delBuilding); return; }

    // Subjects
    if (e.target.id === 'btn-toggle-add-subj') { S._showAddSubjForm = !S._showAddSubjForm; render(); return; }
    if (e.target.id === 'btn-cancel-subj') { S._showAddSubjForm = false; render(); return; }
    if (e.target.id === 'btn-save-subj') { handleSaveSubject(); return; }
    const delSubj = e.target.closest('[data-del-subj]');
    if (delSubj && canEdit()) { handleDeleteSubject(delSubj.dataset.delSubj); return; }

    // Sections
    if (e.target.id === 'btn-toggle-add-sec') { S._showAddSecForm = !S._showAddSecForm; render(); return; }
    if (e.target.id === 'btn-cancel-sec') { S._showAddSecForm = false; render(); return; }
    if (e.target.id === 'btn-save-sec') { handleSaveSection(); return; }
    const delSec = e.target.closest('[data-del-sec]');
    if (delSec && canEdit()) { handleDeleteSection(delSec.dataset.delSec); return; }

    // Constraints
    if (e.target.id === 'btn-toggle-add-con') { S._showAddConForm = !S._showAddConForm; render(); return; }
    if (e.target.id === 'btn-cancel-con') { S._showAddConForm = false; render(); return; }
    if (e.target.id === 'btn-save-con') { handleSaveConstraint(); return; }
    const delCon = e.target.closest('[data-del-con]');
    if (delCon && canEdit()) { handleDeleteConstraint(delCon.dataset.delCon); return; }

    // Schedule
    if (e.target.id === 'btn-auto-sched' && canEdit()) { handleAutoSchedule(); return; }
    if (e.target.id === 'btn-clear-sched' && canAdmin()) { handleClearSchedule(); return; }
    if (e.target.id === 'clear-filter') { S.filterFacId=''; S.filterSecId=''; S.filterSubjId=''; render(); return; }

    // Reports
    if (e.target.id === 'btn-export-csv') { handleExportCSV(); return; }

    // Admin
    if (e.target.id === 'btn-add-user') { handleAddUser(); return; }
    if (e.target.id === 'btn-reload-users') { loadAdminUsers(); return; }
    const delUser = e.target.closest('[data-del-user]');
    if (delUser && canAdmin()) { handleRemoveUser(delUser.dataset.delUser); return; }
    if (e.target.id === 'btn-save-cfg') { handleSaveConfig(); return; }
    if (e.target.id === 'btn-init-sheets') { handleInitSheets(); return; }
  });

  // Live filters
  app.addEventListener('change', function(e) {
    if (e.target.id === 'filt-fac')   { S.filterFacId  = e.target.value; renderSchedulePartial(); }
    if (e.target.id === 'filt-sec')   { S.filterSecId  = e.target.value; renderSchedulePartial(); }
    if (e.target.id === 'filt-subj')  { S.filterSubjId = e.target.value; renderSchedulePartial(); }
    if (e.target.id === 'fac-dept-filter') { S.facDeptFilter = e.target.value; render(); }
  });
  app.addEventListener('input', function(e) {
    if (e.target.id === 'fac-search') { S.facSearch = e.target.value; render(); }
  });
}

// Partial re-render for schedule tab (avoid full page flash on filter/select)
function renderSchedulePartial() {
  const existing = q('.schedule-layout');
  if (existing) {
    const tmp = document.createElement('div');
    tmp.innerHTML = renderScheduleTab();
    const newLayout = tmp.querySelector('.schedule-layout');
    if (newLayout) existing.replaceWith(newLayout);
    const fb = q('.filter-bar');
    if (fb) fb.replaceWith(tmp.querySelector('.filter-bar'));
    bindEvents();
  } else {
    render();
  }
}

// ─── Action Handlers ───────────────────────────────────────────────────────

function handlePlaceLesson(periodId) {
  if (!S.selectedLessonId || !periodId) return;
  const lesson = byId(S.lessons, S.selectedLessonId);
  if (!lesson) return;

  // Find an available room
  const occupied = entriesForPeriod(periodId).map(e => e.roomId);
  let roomId = lesson.preferredRoomId;
  if (!roomId || occupied.includes(roomId)) {
    const subj = byId(S.subjects, lesson.subjectId);
    const req = subj ? subj.requiresRoom : null;
    const room = S.rooms.find(r => !occupied.includes(r.id) && (!req || r.type === req))
              || S.rooms.find(r => !occupied.includes(r.id));
    roomId = room ? room.id : '';
  }

  const entry = { id: 'sch_' + Date.now(), lessonId: lesson.id, periodId, roomId, status: 'placed', lockedBy: '' };

  // Optimistic update
  S.schedule.push(entry);
  S.selectedLessonId = null;
  renderSchedulePartial();

  call('saveScheduleEntry', [entry], function(res) {
    // Update id from server
    const idx = S.schedule.indexOf(entry);
    if (idx > -1) S.schedule[idx].id = res.id;
    toast('Session placed');
  }, function() {
    // Rollback
    S.schedule = S.schedule.filter(e => e !== entry);
    render();
  });
}

function handleRemoveEntry(entryId) {
  const entry = S.schedule.find(e => e.id === entryId);
  if (!entry || entry.status === 'locked') return;
  S.schedule = S.schedule.filter(e => e.id !== entryId);
  renderSchedulePartial();
  call('deleteScheduleEntry', [entryId], () => toast('Session removed'), () => { S.schedule.push(entry); render(); });
}

function handleLockEntry(entryId) {
  const entry = S.schedule.find(e => e.id === entryId);
  if (!entry) return;
  const wasLocked = entry.status === 'locked';
  entry.status = wasLocked ? 'placed' : 'locked';
  renderSchedulePartial();
  call('saveScheduleEntry', [entry], () => toast(wasLocked ? 'Unlocked' : 'Locked'), () => {
    entry.status = wasLocked ? 'locked' : 'placed'; render();
  });
}

function handleAutoSchedule() {
  if (!canEdit()) return;
  toast('Running auto-scheduler…', 'warn');
  call('autoSchedule', [], function(res) {
    if (res && res.entries) {
      S.schedule = res.entries;
      toast('Scheduled ' + res.placed + ' of ' + res.total + ' lessons');
      render();
    }
  });
}

function handleClearSchedule() {
  if (!confirm('Clear all non-locked schedule entries?')) return;
  call('clearSchedule', [true], function() {
    S.schedule = S.schedule.filter(e => e.status === 'locked');
    toast('Schedule cleared (locked entries kept)');
    render();
  });
}

// Faculty
function handleAddFaculty() {
  const fn = (q('#nf-fn')||{}).value;
  const ln = (q('#nf-ln')||{}).value;
  if (!fn || !ln) { toast('First and last name are required', 'err'); return; }
  const data = {
    firstName: fn, lastName: ln, email: (q('#nf-email')||{}).value||'',
    department: (q('#nf-dept')||{}).value||'GEd', track: (q('#nf-track')||{}).value||'',
    role: (q('#nf-role')||{}).value||'full-time',
    maxPerDay: Number((q('#nf-mpd')||{}).value)||5, maxPerWeek: Number((q('#nf-mpw')||{}).value)||22,
    subjects: [], availability: [], isAdviser: false, notes: '',
  };
  call('saveFaculty', [data], function(res) {
    data.id = res.id;
    S.faculty.push(data);
    S.selectedFacId = data.id;
    S._showAddFacForm = false;
    toast('Faculty added: ' + fn + ' ' + ln);
    render();
  });
}

function handleSaveFaculty(id) {
  const fac = byId(S.faculty, id);
  if (!fac) return;
  const updated = {
    ...fac,
    firstName: (q('#fac-edit-fn')||{}).value || fac.firstName,
    lastName:  (q('#fac-edit-ln')||{}).value || fac.lastName,
    email:     (q('#fac-edit-email')||{}).value || fac.email,
    department:(q('#fac-edit-dept')||{}).value || fac.department,
    track:     (q('#fac-edit-track')||{}).value || '',
    role:      (q('#fac-edit-role')||{}).value || fac.role,
    maxPerDay: Number((q('#fac-edit-mpd')||{}).value) || fac.maxPerDay,
    maxPerWeek:Number((q('#fac-edit-mpw')||{}).value) || fac.maxPerWeek,
  };
  call('saveFaculty', [updated], function() {
    Object.assign(fac, updated);
    toast('Faculty updated');
    render();
  });
}

function handleDeleteFaculty(id) {
  if (!confirm('Delete this faculty member? Their scheduled sessions will remain.')) return;
  call('deleteFaculty', [id], function() {
    S.faculty = S.faculty.filter(f => f.id !== id);
    if (S.selectedFacId === id) S.selectedFacId = null;
    toast('Faculty deleted');
    render();
  });
}

function handleToggleAvailability(cell) {
  const facId    = cell.dataset.availFac;
  const periodId = cell.dataset.availPeriod;
  const day      = cell.dataset.availDay;
  const fac      = byId(S.faculty, facId);
  if (!fac) return;

  let avail = fac.availability ? [...fac.availability] : [];
  let daySlot = avail.find(a => a.day === day);
  if (!daySlot) { daySlot = { day, periodIds: [] }; avail.push(daySlot); }

  const idx = daySlot.periodIds.indexOf(periodId);
  if (idx === -1) daySlot.periodIds.push(periodId);
  else daySlot.periodIds.splice(idx, 1);

  fac.availability = avail;

  // Toggle cell immediately
  cell.classList.toggle('on');
  cell.textContent = cell.classList.contains('on') ? '✓' : '';

  const update = { ...fac, availability: avail };
  call('saveFaculty', [update], () => {}, () => {
    // rollback cell
    cell.classList.toggle('on');
    cell.textContent = cell.classList.contains('on') ? '✓' : '';
    toast('Failed to save availability', 'err');
  });
}

// Rooms
function handleSaveRoom(existingId) {
  const name = (q('#rf-name')||{}).value;
  if (!name) { toast('Room name is required', 'err'); return; }
  const data = {
    id: existingId || '',
    name, code: (q('#rf-code')||{}).value||'',
    capacity: Number((q('#rf-cap')||{}).value)||35,
    type: (q('#rf-type')||{}).value||'classroom',
    buildingId: (q('#rf-bldg')||{}).value||'',
    features: [],
  };
  call('saveRoom', [data], function(res) {
    if (!data.id) data.id = res.id;
    const idx = S.rooms.findIndex(r => r.id === data.id);
    if (idx > -1) S.rooms[idx] = data; else S.rooms.push(data);
    S.selectedRoomId = data.id;
    S._showAddRoomForm = false;
    toast('Room saved');
    render();
  });
}

function handleDeleteRoom(id) {
  if (!confirm('Delete this room?')) return;

    S.rooms = S.rooms.filter(r => r.id !== id);
    if (S.selectedRoomId === id) S.selectedRoomId = null;
    toast('Room deleted'); render();
  });
}

  call('getUsers', [], function(users) {

    render();
  });
}

function handleAddUser() {
  const email = (q('#new-user-email')||{}).value;
  if (!email || !email.toLowerCase().endsWith('@dlsl.edu.ph')) {
    toast('Only @dlsl.edu.ph email addresses are allowed', 'err'); return;
  }
  const data = { email, name: (q('#new-user-name')||{}).value||email.split('@')[0], role: (q('#new-user-role')||{}).value||'viewer' };
  call('saveUser', [data], function() {
    S.adminUsers.push(data);
    toast('User added: ' + email); render();
  });
}

function handleRoleChange(email, role) {
  call('saveUser', [{ email, role, name: (S.adminUsers.find(u=>u.email===email)||{}).name||'' }], function() {
    const u = S.adminUsers.find(u2 => u2.email === email);
    if (u) u.role = role;
    toast('Role updated');
  });
}

function handleRemoveUser(email) {
  if (!confirm('Remove user ' + email + '?')) return;
  call('removeUser', [email], function() {
    S.adminUsers = S.adminUsers.filter(u => u.email !== email);
    toast('User removed'); render();
  });
}

}

function handleExportCSV() {
  call('exportScheduleCSV', [], function(csv) {
    const blob = new Blob([csv], { type: 'text/csv' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url; a.download = 'dlsl-timetable.csv';
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
    toast('CSV downloaded');
  });
}
