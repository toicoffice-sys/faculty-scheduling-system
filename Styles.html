<style>
/* ─── Variables ─────────────────────────────────────────────────────────── */
:root {
  --g900: #1B5E20;
  --g800: #2E7D32;
  --g700: #388E3C;
  --g200: #C8E6C9;
  --g100: #E8F5E9;
  --g50:  #F1F8F1;
  --text: #1A2E1A;
  --text-mid: #3D5C3D;
  --text-muted: #6B896B;
  --border: #D0E8D0;
  --card: #FFFFFF;
  --bg: #F4FAF4;
  --danger: #C62828;
  --danger-bg: #FFEBEE;
  --warn: #E65100;
  --warn-bg: #FFF3E0;
  --success: #1B5E20;
  --radius: 8px;
  --radius-lg: 12px;
  --shadow: 0 1px 4px rgba(27,94,32,.10);
  --shadow-md: 0 4px 16px rgba(27,94,32,.12);
  --font: 'Google Sans', 'Segoe UI', system-ui, sans-serif;
  --header-h: 60px;
  --sidebar-w: 260px;
}

/* ─── Reset ─────────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: var(--font); background: var(--bg); color: var(--text); font-size: 14px; }
button { cursor: pointer; font-family: inherit; }
input, select, textarea { font-family: inherit; font-size: 13px; }
a { color: var(--g800); }
table { border-collapse: collapse; width: 100%; }

/* ─── Boot / Loading ─────────────────────────────────────────────────────── */
.boot-screen {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  height: 100vh; gap: 16px;
}
.boot-spinner {
  width: 40px; height: 40px; border: 3px solid var(--g200);
  border-top-color: var(--g800); border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.boot-text { color: var(--text-muted); font-size: 13px; }

/* ─── Auth screens ───────────────────────────────────────────────────────── */
.auth-page {
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh; background: linear-gradient(135deg, var(--g900) 0%, var(--g700) 100%);
}
.auth-card {
  background: var(--card); border-radius: var(--radius-lg); padding: 40px 48px;
  box-shadow: 0 8px 32px rgba(0,0,0,.20); text-align: center; max-width: 420px; width: 100%;
}
.auth-logo { height: 64px; width: auto; margin-bottom: 20px; }
.auth-title { font-size: 22px; font-weight: 700; color: var(--g900); margin-bottom: 4px; }
.auth-sub { font-size: 13px; color: var(--text-muted); margin-bottom: 24px; }
.auth-msg { font-size: 13px; color: var(--text-muted); padding: 12px 16px; background: var(--g50); border-radius: var(--radius); border: 1px solid var(--border); }
.auth-err { color: var(--danger); background: var(--danger-bg); border-color: #FFCDD2; }

/* ─── App layout ─────────────────────────────────────────────────────────── */
.app { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

/* ─── Header ─────────────────────────────────────────────────────────────── */
.header {
  height: var(--header-h); background: var(--g900); color: #fff;
  display: flex; align-items: center; gap: 0; flex-shrink: 0;
  padding: 0 16px; border-bottom: 2px solid var(--g800);
  box-shadow: 0 2px 8px rgba(0,0,0,.20); z-index: 100; position: relative;
}
.header__brand { display: flex; align-items: center; gap: 10px; margin-right: 16px; flex-shrink: 0; }
.header__logo { height: 36px; width: auto; border-radius: 6px; background: #fff; padding: 2px; }
.header__title-wrap { line-height: 1.1; }
.header__title { font-size: 15px; font-weight: 700; letter-spacing: .02em; color: #fff; }
.header__sub { font-size: 11px; color: rgba(255,255,255,.65); }
.header__nav { display: flex; align-items: stretch; height: var(--header-h); flex: 1; overflow-x: auto; }
.header__nav::-webkit-scrollbar { display: none; }
.nav-btn {
  display: flex; align-items: center; gap: 6px; padding: 0 16px;
  font-size: 13px; font-weight: 500; color: rgba(255,255,255,.75);
  background: none; border: none; border-bottom: 3px solid transparent;
  cursor: pointer; white-space: nowrap; transition: color .15s, border-color .15s;
  text-transform: uppercase; letter-spacing: .06em;
}
.nav-btn:hover { color: #fff; background: rgba(255,255,255,.08); }
.nav-btn.active { color: #fff; border-bottom-color: #fff; font-weight: 700; }
.nav-badge {
  background: var(--danger); color: #fff; border-radius: 12px;
  font-size: 10px; font-weight: 700; padding: 1px 6px; min-width: 18px; text-align: center;
}
.header__right { display: flex; align-items: center; gap: 10px; margin-left: auto; flex-shrink: 0; }
.term-chip {
  font-size: 11px; background: rgba(255,255,255,.12); border-radius: 20px;
  padding: 3px 10px; color: rgba(255,255,255,.9); white-space: nowrap;
}
.stat-pills { display: flex; gap: 6px; }
.stat-pill {
  font-size: 11px; display: flex; align-items: center; gap: 4px;
  background: rgba(255,255,255,.10); border-radius: 20px; padding: 2px 8px;
}
.stat-pill__val { font-weight: 700; color: #fff; }
.stat-pill__lbl { color: rgba(255,255,255,.65); }
.user-chip {
  display: flex; align-items: center; gap: 6px; font-size: 12px;
  color: rgba(255,255,255,.85);
}
.role-badge {
  font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 10px;
  text-transform: uppercase; letter-spacing: .04em;
}
.role-badge--admin  { background: var(--g200); color: var(--g900); }
.role-badge--editor { background: #BBDEFB; color: #1565C0; }
.role-badge--viewer { background: #E0E0E0; color: #424242; }
.btn-signout {
  font-size: 12px; padding: 5px 12px; border-radius: 6px;
  background: rgba(255,255,255,.12); color: rgba(255,255,255,.9);
  border: 1px solid rgba(255,255,255,.20);
}
.btn-signout:hover { background: rgba(255,255,255,.20); }

/* ─── Main content ───────────────────────────────────────────────────────── */
.main { flex: 1; overflow: hidden; display: flex; }
.tab-content { flex: 1; overflow-y: auto; padding: 20px; }
.tab-content--nogap { flex: 1; overflow: hidden; display: flex; padding: 0; }

/* ─── Buttons ────────────────────────────────────────────────────────────── */
.btn {
  display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px;
  border-radius: var(--radius); font-size: 13px; font-weight: 600; border: none;
  cursor: pointer; transition: background .15s, opacity .15s; white-space: nowrap;
}
.btn:disabled { opacity: .5; cursor: not-allowed; }
.btn-primary  { background: var(--g800); color: #fff; }
.btn-primary:hover:not(:disabled)  { background: var(--g900); }
.btn-secondary { background: var(--g100); color: var(--g900); border: 1px solid var(--border); }
.btn-secondary:hover:not(:disabled) { background: var(--g200); }
.btn-danger   { background: var(--danger-bg); color: var(--danger); border: 1px solid #FFCDD2; }
.btn-danger:hover:not(:disabled)  { background: #FFCDD2; }
.btn-ghost    { background: transparent; color: var(--text-mid); border: 1px solid var(--border); }
.btn-ghost:hover:not(:disabled) { background: var(--g50); }
.btn-sm  { padding: 5px 10px; font-size: 12px; }
.btn-xs  { padding: 3px 8px; font-size: 11px; }
.btn-icon { padding: 6px; border-radius: 6px; background: none; border: none; color: var(--text-muted); font-size: 15px; transition: background .15s; }
.btn-icon:hover { background: var(--g100); color: var(--g900); }

/* ─── Forms ──────────────────────────────────────────────────────────────── */
.form-group { display: flex; flex-direction: column; gap: 5px; }
.form-label { font-size: 12px; font-weight: 600; color: var(--text-mid); text-transform: uppercase; letter-spacing: .04em; }
.form-input, .form-select {
  padding: 8px 10px; border: 1px solid var(--border); border-radius: var(--radius);
  background: var(--card); color: var(--text); font-size: 13px;
  transition: border-color .15s, box-shadow .15s;
}
.form-input:focus, .form-select:focus {
  outline: none; border-color: var(--g700);
  box-shadow: 0 0 0 3px rgba(46,125,50,.12);
}
.form-input--sm, .form-select--sm { padding: 5px 8px; font-size: 12px; }
.form-row { display: flex; gap: 12px; align-items: flex-end; }
.form-row .form-group { flex: 1; }
.form-err { color: var(--danger); font-size: 12px; }

/* ─── Page header ────────────────────────────────────────────────────────── */
.page-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
.page-title { font-size: 20px; font-weight: 700; color: var(--g900); }
.page-header__actions { margin-left: auto; display: flex; gap: 8px; align-items: center; }

/* ─── Cards ──────────────────────────────────────────────────────────────── */
.card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius-lg); box-shadow: var(--shadow);
}
.card-body { padding: 20px; }

/* ─── Data table ─────────────────────────────────────────────────────────── */
.data-table { width: 100%; font-size: 13px; }
.data-table th {
  text-align: left; padding: 10px 12px; font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: .06em; color: var(--text-muted);
  background: var(--g50); border-bottom: 1px solid var(--border);
}
.data-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
.data-table tr:last-child td { border-bottom: none; }
.data-table tr:hover td { background: var(--g50); }
.table-wrap { border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; overflow-x: auto; }

/* ─── Mini progress bar ──────────────────────────────────────────────────── */
.mini-bar { display: flex; align-items: center; gap: 6px; }
.mini-bar__track { flex: 1; height: 6px; background: var(--g100); border-radius: 3px; overflow: hidden; }
.mini-bar__fill  { height: 100%; background: var(--g800); border-radius: 3px; transition: width .3s; }
.mini-bar__label { font-size: 11px; color: var(--text-muted); min-width: 30px; text-align: right; }

/* ─── Toast ──────────────────────────────────────────────────────────────── */
.toast-wrap {
  position: fixed; bottom: 24px; right: 24px; z-index: 9999;
  display: flex; flex-direction: column; gap: 8px; pointer-events: none;
}
.toast {
  background: var(--g900); color: #fff; border-radius: var(--radius);
  padding: 10px 18px; font-size: 13px; box-shadow: var(--shadow-md);
  animation: slideUp .25s ease; pointer-events: all;
}
.toast--err { background: var(--danger); }
.toast--warn { background: var(--warn); }
@keyframes slideUp { from { opacity:0; transform: translateY(12px); } to { opacity:1; transform: translateY(0); } }

/* ─── Spinner inline ─────────────────────────────────────────────────────── */
.spinner {
  display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.3);
  border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite;
}
.spinner--dark { border-color: var(--g200); border-top-color: var(--g800); }

/* ─── SCHEDULE TAB ───────────────────────────────────────────────────────── */
.schedule-layout { display: flex; height: 100%; overflow: hidden; }

/* Unscheduled sidebar */
.unscheduled-panel {
  width: 240px; min-width: 200px; background: var(--card); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; flex-shrink: 0; overflow: hidden;
}
.unscheduled-panel__head {
  padding: 14px 14px 10px; border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.unscheduled-panel__title { font-size: 13px; font-weight: 700; color: var(--g900); margin-bottom: 10px; }
.unscheduled-panel__list { flex: 1; overflow-y: auto; padding: 8px; }
.unscheduled-panel__empty { padding: 20px 8px; text-align: center; color: var(--text-muted); font-size: 12px; }
.unscheduled-panel__filter { display: flex; gap: 6px; margin-top: 8px; }
.unscheduled-panel__filter .form-input { flex: 1; }

.lesson-item {
  display: flex; flex-direction: column; gap: 3px; padding: 8px 10px;
  border-radius: var(--radius); cursor: pointer; margin-bottom: 4px;
  border: 1px solid transparent; transition: background .12s, border-color .12s;
}
.lesson-item:hover { background: var(--g50); border-color: var(--border); }
.lesson-item.selected { background: var(--g100); border-color: var(--g700); }
.lesson-item__subj { font-size: 12px; font-weight: 700; color: var(--g900); display: flex; align-items: center; gap: 5px; }
.lesson-item__dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.lesson-item__teacher { font-size: 11px; color: var(--text-mid); }
.lesson-item__meta { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 2px; }
.lesson-item__chip {
  font-size: 10px; padding: 1px 6px; border-radius: 10px;
  background: var(--g100); color: var(--g800); font-weight: 600;
}
.lesson-item__chip--section { background: #E3F2FD; color: #1565C0; }
.lesson-item__chip--periods { background: #FFF8E1; color: #E65100; }

/* Schedule grid */
.schedule-grid-area { flex: 1; overflow: auto; padding: 16px; }
.schedule-grid {
  display: grid; min-width: max-content;
  grid-template-columns: 90px repeat(5, minmax(140px, 1fr));
  gap: 2px; font-size: 12px;
}
.grid-corner { /* top-left empty cell */ }
.grid-day-hdr {
  padding: 8px 10px; text-align: center; font-weight: 700;
  font-size: 12px; text-transform: uppercase; letter-spacing: .05em;
  background: var(--g900); color: #fff; border-radius: var(--radius);
}
.grid-period-lbl {
  display: flex; flex-direction: column; align-items: flex-end; justify-content: flex-start;
  padding: 8px 8px 0 0; font-size: 10px; color: var(--text-muted); font-weight: 600;
  text-transform: uppercase; letter-spacing: .04em;
}
.grid-period-lbl span { display: block; }
.grid-period-lbl .time { font-size: 9px; color: var(--border); font-weight: 400; }

.grid-cell {
  background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
  min-height: 72px; padding: 4px; display: flex; flex-direction: column;
  gap: 3px; transition: background .12s, border-color .12s;
}
.grid-cell--lunch { background: var(--g50); border-style: dashed; }
.grid-cell--lunch-lbl {
  font-size: 10px; color: var(--text-muted); text-align: center; padding: 22px 0;
  text-transform: uppercase; letter-spacing: .06em;
}
.grid-cell.droppable { background: var(--g100); border-color: var(--g700); border-width: 2px; cursor: crosshair; }
.grid-cell.droppable::after {
  content: '+ Place here'; display: flex; align-items: center; justify-content: center;
  font-size: 10px; color: var(--g800); font-weight: 600; padding: 4px;
}
.grid-cell.droppable:not(:has(.entry-card)):hover { background: var(--g200); }

/* Entry cards */
.entry-card {
  border-left: 3px solid var(--g700); background: var(--g50);
  border-radius: 5px; padding: 5px 7px; cursor: pointer;
  transition: background .12s; position: relative;
}
.entry-card:hover { background: var(--g100); }
.entry-card.locked { border-left-color: #1565C0; background: #E3F2FD; }
.entry-card.conflict { border-left-color: var(--danger); background: var(--danger-bg); }
.entry-card__subj { font-size: 11px; font-weight: 700; color: var(--g900); }
.entry-card__teacher { font-size: 10px; color: var(--text-mid); }
.entry-card__meta { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 2px; }
.entry-card__room { font-size: 9px; background: var(--g200); color: var(--g900); padding: 0 4px; border-radius: 3px; font-weight: 600; }
.entry-card__section { font-size: 9px; background: #BBDEFB; color: #1565C0; padding: 0 4px; border-radius: 3px; font-weight: 600; }
.entry-card__lock-icon { position: absolute; top: 4px; right: 4px; font-size: 9px; }
.entry-card__conflict { font-size: 9px; color: var(--danger); font-weight: 700; margin-top: 2px; }
.entry-card__actions { display: none; gap: 2px; position: absolute; top: 2px; right: 2px; }
.entry-card:hover .entry-card__actions { display: flex; }
.entry-card__btn {
  font-size: 10px; padding: 1px 4px; border-radius: 3px; border: none;
  cursor: pointer; font-weight: 700; line-height: 1.4;
}
.entry-card__btn--lock { background: #BBDEFB; color: #1565C0; }
.entry-card__btn--remove { background: var(--danger-bg); color: var(--danger); }

/* Filter bar */
.filter-bar {
  display: flex; align-items: center; gap: 8px; padding: 10px 16px;
  background: var(--card); border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.filter-bar__label { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; }

/* ─── FACULTY TAB ────────────────────────────────────────────────────────── */
.two-col { display: flex; height: 100%; overflow: hidden; }
.sidebar {
  width: var(--sidebar-w); min-width: 200px; border-right: 1px solid var(--border);
  background: var(--card); display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0;
}
.sidebar__head { padding: 14px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.sidebar__head-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.sidebar__title { font-size: 14px; font-weight: 700; color: var(--g900); }
.sidebar__list { flex: 1; overflow-y: auto; }

.list-item {
  display: flex; flex-direction: column; padding: 10px 14px; cursor: pointer;
  border-bottom: 1px solid var(--border); transition: background .1s;
}
.list-item:hover { background: var(--g50); }
.list-item.active { background: var(--g100); border-left: 3px solid var(--g800); }
.list-item__name { font-size: 13px; font-weight: 600; color: var(--text); }
.list-item__sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.list-item__tags { display: flex; gap: 4px; margin-top: 4px; flex-wrap: wrap; }

.detail-pane { flex: 1; overflow-y: auto; padding: 20px; }
.detail-pane__placeholder {
  display: flex; align-items: center; justify-content: center; height: 100%;
  color: var(--text-muted); font-size: 14px; flex-direction: column; gap: 8px;
}
.detail-pane__placeholder svg { opacity: .3; }

/* Faculty type badge */
.type-badge { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 10px; text-transform: uppercase; }
.type-badge--full-time { background: var(--g100); color: var(--g900); }
.type-badge--part-time { background: #FFF3E0; color: #E65100; }
.type-badge--shared    { background: #EDE7F6; color: #512DA8; }
.type-badge--adviser   { background: #E3F2FD; color: #1565C0; }

/* Availability table */
.avail-table { border-collapse: collapse; }
.avail-table th { padding: 6px 10px; font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; }
.avail-table td { padding: 4px 6px; }
.avail-cell {
  width: 36px; height: 30px; border-radius: 5px; border: 1.5px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; cursor: pointer; transition: background .1s, border-color .1s;
  background: var(--card);
}
.avail-cell.on { background: var(--g800); border-color: var(--g800); color: #fff; }
.avail-cell:hover:not(.on) { background: var(--g50); border-color: var(--g700); }
.avail-cell.readonly { cursor: default; }

/* ─── ROOMS TAB ──────────────────────────────────────────────────────────── */
.building-group { margin-bottom: 16px; }
.building-name {
  font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em;
  color: var(--text-muted); padding: 8px 14px; display: flex; align-items: center; gap: 8px;
}
.building-name .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--g800); }

.room-card {
  display: flex; align-items: center; gap: 10px; padding: 10px 14px;
  cursor: pointer; border-bottom: 1px solid var(--border); transition: background .1s;
  background: none; border-left: 3px solid transparent; width: 100%; text-align: left;
}
.room-card:hover { background: var(--g50); }
.room-card.active { background: var(--g100); border-left-color: var(--g800); }
.room-card__icon { font-size: 18px; flex-shrink: 0; }
.room-card__name { font-size: 13px; font-weight: 600; color: var(--text); }
.room-card__code { font-size: 11px; color: var(--text-muted); }
.room-type-badge { font-size: 10px; padding: 1px 6px; border-radius: 8px; background: var(--g100); color: var(--g800); font-weight: 600; }

/* ─── SUBJECTS / SECTIONS TABLES ─────────────────────────────────────────── */
.subject-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 6px; }
.inline-form {
  background: var(--g50); border-radius: var(--radius); padding: 14px;
  border: 1px solid var(--border); margin-bottom: 16px;
}
.inline-form-title { font-size: 13px; font-weight: 700; color: var(--g900); margin-bottom: 12px; }

/* ─── REPORTS ─────────────────────────────────────────────────────────────── */
.report-cards { display: flex; gap: 14px; margin-bottom: 24px; flex-wrap: wrap; }
.report-card {
  flex: 1; min-width: 130px; background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 18px 20px; text-align: center;
  box-shadow: var(--shadow);
}
.report-card__val { font-size: 32px; font-weight: 800; color: var(--g900); line-height: 1; }
.report-card__lbl { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
.report-card--danger .report-card__val { color: var(--danger); }
.report-card--success .report-card__val { color: var(--success); }
.dept-badge { font-size: 11px; font-weight: 700; padding: 2px 7px; border-radius: 6px; background: var(--g200); color: var(--g900); }

/* ─── ADMIN / HOW TO ──────────────────────────────────────────────────────── */
.admin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; align-items: start; }
@media (max-width: 900px) { .admin-grid { grid-template-columns: 1fr; } }
.section-title { font-size: 15px; font-weight: 700; color: var(--g900); margin-bottom: 14px; padding-bottom: 8px; border-bottom: 2px solid var(--border); }

.member-row {
  display: flex; align-items: center; gap: 10px; padding: 10px 14px;
  border-bottom: 1px solid var(--border); font-size: 13px; flex-wrap: wrap;
}
.member-row:last-child { border-bottom: none; }
